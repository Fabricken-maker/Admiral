[build]
  command = "echo 'Static site - no build needed'"
  publish = "public"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/auth/register"
  to = "/.netlify/functions/auth-register-supabase"
  status = 200
  force = true

[[redirects]]
  from = "/auth/login"
  to = "/.netlify/functions/auth-login-supabase"
  status = 200
  force = true

[[redirects]]
  from = "/api/user"
  to = "/.netlify/functions/api-user"
  status = 200
  force = true

[[redirects]]
  from = "/api/setup"
  to = "/.netlify/functions/setup"
  status = 200
  force = true

# SPA routing - all other paths go to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"

[[headers]]
  for = "/auth/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
