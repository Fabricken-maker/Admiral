[build]
  command = "echo 'Static site - no build needed'"
  publish = "public"

[env.production]
  environment = { BACKEND_URL = "http://187.124.32.19:3000" }

[env.staging]
  environment = { BACKEND_URL = "http://localhost:3000" }

# Proxy API calls to VPS backend
[[redirects]]
  from = "/api/*"
  to = "http://187.124.32.19:3000/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/auth/*"
  to = "http://187.124.32.19:3000/auth/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/health"
  to = "http://187.124.32.19:3000/health"
  status = 200
  force = true

# SPA routing - all other paths go to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# CORS headers
[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
