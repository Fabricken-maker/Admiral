<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admiral - Meta Ads Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #dce3f0;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        .card {
            background: rgba(26, 31, 58, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(200, 168, 75, 0.2);
            border-radius: 16px;
            padding: 60px 40px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #c8a84b 0%, #5898f0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 16px;
            color: #a0a8b3;
            margin-bottom: 40px;
        }

        .button-group {
            display: flex;
            gap: 12px;
            flex-direction: column;
        }

        button {
            padding: 14px 28px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-login {
            background: linear-gradient(135deg, #c8a84b 0%, #a88a3a 100%);
            color: #0a0e27;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(200, 168, 75, 0.3);
        }

        .btn-register {
            background: rgba(88, 152, 240, 0.2);
            color: #5898f0;
            border: 1px solid #5898f0;
        }

        .btn-register:hover {
            background: rgba(88, 152, 240, 0.3);
            transform: translateY(-2px);
        }

        .features {
            margin-top: 40px;
            padding-top: 40px;
            border-top: 1px solid rgba(200, 168, 75, 0.1);
            text-align: left;
        }

        .feature {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            font-size: 14px;
            color: #a0a8b3;
        }

        .feature-icon {
            color: #3dd68c;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            
            <h1>Admiral</h1>
            <p class="subtitle">Meta Ads Intelligence Dashboard</p>

            <div class="button-group">
                <button class="btn-login" onclick="goToLogin()">Logga in</button>
                <button class="btn-register" onclick="goToRegister()">Registrera dig</button>
            </div>

            <div class="features">
                <div class="feature">
                    <span class="feature-icon">✓</span>
                    <span>Real-time kampanjövervakning</span>
                </div>
                <div class="feature">
                    <span class="feature-icon">✓</span>
                    <span>CPM, Conversion & ROI-analys</span>
                </div>
                <div class="feature">
                    <span class="feature-icon">✓</span>
                    <span>Automatisk Meta Ads-synk</span>
                </div>
                <div class="feature">
                    <span class="feature-icon">✓</span>
                    <span>Setup-wizard för snabb start</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        function goToLogin() {
            window.location.href = '/login.html';
        }

        function goToRegister() {
            window.location.href = '/login.html?register=true';
        }
    </script>
</body>
</html>
