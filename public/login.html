<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admiral - Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 40px 20px;
      text-align: center;
      color: white;
    }

    .header h1 {
      font-size: 32px;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .header p {
      font-size: 14px;
      opacity: 0.9;
    }

    .content {
      padding: 40px;
    }

    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 30px;
      border-bottom: 2px solid #f0f0f0;
    }

    .tab {
      flex: 1;
      padding: 12px;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      color: #999;
      border-bottom: 3px solid transparent;
      transition: all 0.3s ease;
    }

    .tab.active {
      color: #667eea;
      border-bottom-color: #667eea;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #333;
      font-size: 14px;
    }

    input, select {
      width: 100%;
      padding: 12px;
      border: 2px solid #f0f0f0;
      border-radius: 6px;
      font-size: 14px;
      transition: border-color 0.3s ease;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #667eea;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
      transition: transform 0.2s ease;
      margin-top: 10px;
    }

    button:hover {
      transform: translateY(-2px);
    }

    button:active {
      transform: translateY(0);
    }

    .error {
      background-color: #fee;
      color: #c33;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }

    .error.show {
      display: block;
    }

    .success {
      background-color: #efe;
      color: #3c3;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }

    .success.show {
      display: block;
    }

    .loading {
      display: none;
      text-align: center;
      padding: 20px;
    }

    .spinner {
      border: 3px solid #f0f0f0;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      animation: spin 1s linear infinite;
      margin: 0 auto 10px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .footer-text {
      text-align: center;
      margin-top: 20px;
      color: #999;
      font-size: 13px;
    }

    .footer-text a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
    }

    .footer-text a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="header">
        <h1>⚓ Admiral</h1>
        <p>Manage Your Ads Like a Captain</p>
      </div>

      <div class="content">
        <div class="tabs">
          <button class="tab active" onclick="switchTab('login')">Login</button>
          <button class="tab" onclick="switchTab('register')">Register</button>
        </div>

        <!-- Login Form -->
        <div id="login" class="tab-content active">
          <div class="error" id="loginError"></div>
          <div class="success" id="loginSuccess"></div>
          <div class="loading" id="loginLoading">
            <div class="spinner"></div>
            <p>Logging in...</p>
          </div>

          <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
              <label for="loginEmail">Email</label>
              <input type="email" id="loginEmail" name="email" required>
            </div>

            <div class="form-group">
              <label for="loginPassword">Password</label>
              <input type="password" id="loginPassword" name="password" required>
            </div>

            <button type="submit">Login</button>
          </form>

          <div class="footer-text">
            Don't have an account? <a href="#" onclick="switchTab('register')">Register here</a>
          </div>
        </div>

        <!-- Register Form -->
        <div id="register" class="tab-content">
          <div class="error" id="registerError"></div>
          <div class="success" id="registerSuccess"></div>
          <div class="loading" id="registerLoading">
            <div class="spinner"></div>
            <p>Creating account...</p>
          </div>

          <form id="registerForm" onsubmit="handleRegister(event)">
            <div class="form-row">
              <div class="form-group">
                <label for="firstName">First Name</label>
                <input type="text" id="firstName" name="first_name">
              </div>
              <div class="form-group">
                <label for="lastName">Last Name</label>
                <input type="text" id="lastName" name="last_name">
              </div>
            </div>

            <div class="form-group">
              <label for="companyName">Company Name *</label>
              <input type="text" id="companyName" name="company_name" required>
            </div>

            <div class="form-group">
              <label for="registerEmail">Email *</label>
              <input type="email" id="registerEmail" name="email" required>
            </div>

            <div class="form-group">
              <label for="phone">Phone</label>
              <input type="tel" id="phone" name="phone">
            </div>

            <div class="form-group">
              <label for="registerPassword">Password *</label>
              <input type="password" id="registerPassword" name="password" required>
            </div>

            <button type="submit">Create Account</button>
          </form>

          <div class="footer-text">
            Already have an account? <a href="#" onclick="switchTab('login')">Login here</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = '/auth';

    function switchTab(tab) {
      // Hide all tabs
      document.querySelectorAll('.tab-content').forEach(el => {
        el.classList.remove('active');
      });
      document.querySelectorAll('.tab').forEach(el => {
        el.classList.remove('active');
      });

      // Show selected tab
      document.getElementById(tab).classList.add('active');
      event.target.classList.add('active');
    }

    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;

      showLoading('login');
      hideError('login');

      try {
        const response = await fetch(`${API_URL}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          showSuccess('login', 'Login successful! Redirecting...');
          setTimeout(() => {
            window.location.href = '/dashboard.html';
          }, 1500);
        } else {
          showError('login', data.error || 'Login failed');
        }
      } catch (err) {
        showError('login', 'Network error: ' + err.message);
      } finally {
        hideLoading('login');
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const formData = {
        email: document.getElementById('registerEmail').value,
        password: document.getElementById('registerPassword').value,
        company_name: document.getElementById('companyName').value,
        first_name: document.getElementById('firstName').value,
        last_name: document.getElementById('lastName').value,
        phone: document.getElementById('phone').value
      };

      showLoading('register');
      hideError('register');

      try {
        const response = await fetch(`${API_URL}/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(formData)
        });

        const data = await response.json();

        if (response.ok) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          showSuccess('register', 'Account created! Redirecting...');
          setTimeout(() => {
            window.location.href = '/dashboard.html';
          }, 1500);
        } else {
          showError('register', data.error || 'Registration failed');
        }
      } catch (err) {
        showError('register', 'Network error: ' + err.message);
      } finally {
        hideLoading('register');
      }
    }

    function showError(tab, message) {
      const errorEl = document.getElementById(`${tab}Error`);
      errorEl.textContent = message;
      errorEl.classList.add('show');
    }

    function hideError(tab) {
      document.getElementById(`${tab}Error`).classList.remove('show');
    }

    function showSuccess(tab, message) {
      const successEl = document.getElementById(`${tab}Success`);
      successEl.textContent = message;
      successEl.classList.add('show');
    }

    function showLoading(tab) {
      document.getElementById(`${tab}Loading`).style.display = 'block';
    }

    function hideLoading(tab) {
      document.getElementById(`${tab}Loading`).style.display = 'none';
    }

    // Check if already logged in
    window.addEventListener('load', () => {
      const token = localStorage.getItem('token');
      if (token) {
        window.location.href = '/dashboard.html';
      }
    });
  </script>
</body>
</html>
