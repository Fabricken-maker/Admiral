<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admiral - Logga in</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #dce3f0;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .card {
            background: rgba(26, 31, 58, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(200, 168, 75, 0.2);
            border-radius: 16px;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #c8a84b 0%, #5898f0 100%);
            padding: 40px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            color: #0a0e27;
            margin-bottom: 8px;
        }

        .header p {
            color: rgba(10, 14, 39, 0.8);
            font-size: 14px;
        }

        .form-container {
            padding: 40px 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: #dce3f0;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(200, 168, 75, 0.3);
            border-radius: 8px;
            background: rgba(10, 14, 39, 0.5);
            color: #dce3f0;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #c8a84b;
        }

        .password-group {
            display: none;
        }

        .password-group.active {
            display: block;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #c8a84b 0%, #a88a3a 100%);
            color: #0a0e27;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(200, 168, 75, 0.3);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .toggle-mode {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }

        .toggle-mode a {
            color: #5898f0;
            cursor: pointer;
            text-decoration: none;
        }

        .toggle-mode a:hover {
            text-decoration: underline;
        }

        .back-link {
            text-align: center;
            margin-bottom: 20px;
        }

        .back-link a {
            color: #a0a8b3;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link a:hover {
            color: #dce3f0;
        }

        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }

        .message.error {
            background: rgba(255, 68, 68, 0.2);
            color: #ff4444;
            border: 1px solid rgba(255, 68, 68, 0.3);
        }

        .message.success {
            background: rgba(61, 214, 140, 0.2);
            color: #3dd68c;
            border: 1px solid rgba(61, 214, 140, 0.3);
        }

        .message.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>⚓ Admiral</h1>
                <p id="header-subtitle">Logga in på ditt konto</p>
            </div>

            <div class="form-container">
                <div class="back-link">
                    <a href="/">← Tillbaka</a>
                </div>

                <div id="message" class="message"></div>

                <form id="auth-form">
                    <div class="form-group">
                        <label for="email">E-postadress</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="din@email.com"
                            required
                        >
                    </div>

                    <div class="form-group password-group active" id="password-login-group">
                        <label for="password">Lösenord</label>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="Ditt lösenord"
                            required
                        >
                    </div>

                    <div class="form-group password-group" id="password-register-group">
                        <label for="password-new">Lösenord (minst 6 tecken)</label>
                        <input 
                            type="password" 
                            id="password-new" 
                            name="password-new" 
                            placeholder="Välj ett starkt lösenord"
                            required
                        >
                    </div>

                    <div class="form-group password-group" id="password-confirm-group">
                        <label for="password-confirm">Bekräfta lösenord</label>
                        <input 
                            type="password" 
                            id="password-confirm" 
                            name="password-confirm" 
                            placeholder="Bekräfta lösenord"
                            required
                        >
                    </div>

                    <button type="submit" id="submit-btn">Logga in</button>
                </form>

                <div class="toggle-mode">
                    <span id="toggle-text">Ingen kund än? <a onclick="toggleMode()">Registrera dig här</a></span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const BACKEND_URL = 'http://187.124.32.19:3000'; // VPS backend
        let isRegisterMode = false;

        // Check if register mode from URL
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('register') === 'true') {
            toggleMode();
        }

        function toggleMode() {
            isRegisterMode = !isRegisterMode;
            const submitBtn = document.getElementById('submit-btn');
            const headerSubtitle = document.getElementById('header-subtitle');
            const toggleText = document.getElementById('toggle-text');
            const loginGroup = document.getElementById('password-login-group');
            const registerGroup = document.getElementById('password-register-group');
            const confirmGroup = document.getElementById('password-confirm-group');

            if (isRegisterMode) {
                submitBtn.textContent = 'Registrera konto';
                headerSubtitle.textContent = 'Skapa ett nytt konto';
                toggleText.innerHTML = 'Redan kund? <a onclick="toggleMode()">Logga in här</a>';
                loginGroup.classList.remove('active');
                registerGroup.classList.add('active');
                confirmGroup.classList.add('active');
            } else {
                submitBtn.textContent = 'Logga in';
                headerSubtitle.textContent = 'Logga in på ditt konto';
                toggleText.innerHTML = 'Ingen kund än? <a onclick="toggleMode()">Registrera dig här</a>';
                loginGroup.classList.add('active');
                registerGroup.classList.remove('active');
                confirmGroup.classList.remove('active');
            }
        }

        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const messageDiv = document.getElementById('message');
            const submitBtn = document.getElementById('submit-btn');

            messageDiv.classList.remove('show', 'error', 'success');
            submitBtn.disabled = true;

            try {
                let response;

                if (isRegisterMode) {
                    const password = document.getElementById('password-new').value;
                    const confirmPassword = document.getElementById('password-confirm').value;

                    if (password !== confirmPassword) {
                        throw new Error('Lösenorden matchar inte');
                    }

                    if (password.length < 6) {
                        throw new Error('Lösenordet måste vara minst 6 tecken');
                    }

                    response = await fetch(`${BACKEND_URL}/auth/register`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        messageDiv.textContent = '✓ Konto skapat! Loggar in...';
                        messageDiv.classList.add('show', 'success');
                        setTimeout(() => {
                            localStorage.setItem('token', data.token);
                            window.location.href = '/dashboard.html';
                        }, 1500);
                    }
                } else {
                    const password = document.getElementById('password').value;

                    response = await fetch(`${BACKEND_URL}/auth/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        messageDiv.textContent = '✓ Logga in lyckades! Omdirigerar...';
                        messageDiv.classList.add('show', 'success');
                        setTimeout(() => {
                            localStorage.setItem('token', data.token);
                            window.location.href = '/dashboard.html';
                        }, 1500);
                    }
                }

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Något gick fel');
                }
            } catch (error) {
                messageDiv.textContent = `✗ ${error.message}`;
                messageDiv.classList.add('show', 'error');
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
