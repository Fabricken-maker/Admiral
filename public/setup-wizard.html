<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admiral — Setup Wizard</title>
    <link rel="stylesheet" href="admiral-tokens.css">
    <style>
        *, *::before, *::after { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        body {
            font-family: -apple-system, 'SF Pro Display', 'Inter', 'Segoe UI', sans-serif;
            background: #060c18;
            color: #fff;
            overflow: hidden;
        }

        .app {
            display: flex;
            height: 100vh;
            position: relative;
        }

        /* TOPBAR */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.15rem 1.65rem;
            border-bottom: 1px solid rgba(255,255,255,0.07);
            background: rgba(6,12,24,.5);
            backdrop-filter: blur(10px);
        }

        .logo-group {
            display: flex;
            align-items: center;
            gap: 0.55rem;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            border-radius: 9px;
            background: linear-gradient(135deg, #1a3a6e, #0d2248);
            border: 1px solid rgba(255,255,255,0.18);
            display: grid;
            place-items: center;
        }

        .logo-text {
            font-size: 1rem;
            font-weight: 800;
            letter-spacing: .18em;
            background: linear-gradient(90deg, #fff 0%, #93c5fd 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .progress {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.6);
        }

        /* MAIN */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* WIZARD CARD */
        .wizard-card {
            background: rgba(12, 24, 46, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(200,168,75,0.3);
            border-radius: 20px;
            padding: 3rem;
            max-width: 700px;
            width: 100%;
        }

        .wizard-step {
            display: none;
        }

        .wizard-step.active {
            display: block;
        }

        .step-title {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #f0c040 0%, #4fc3f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .step-desc {
            color: rgba(255,255,255,0.6);
            margin-bottom: 2rem;
            font-size: 1rem;
        }

        /* FORM FIELDS */
        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: rgba(255,255,255,0.8);
            font-weight: 600;
            font-size: 0.95rem;
        }

        input, select, textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: #fff;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.2s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            background: rgba(255,255,255,0.08);
            border-color: rgba(200,168,75,0.5);
            box-shadow: 0 0 0 3px rgba(200,168,75,0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .input-hint {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
            margin-top: 0.3rem;
        }

        /* BUTTONS */
        .button-group {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        button {
            flex: 1;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #d08a08 0%, #f0c040 100%);
            color: #000;
            box-shadow: 0 10px 30px rgba(208,138,8,0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(208,138,8,0.4);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.3);
        }

        .btn-secondary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* STEP INDICATOR */
        .step-indicator {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        .step-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            transition: all 0.2s;
        }

        .step-dot.active {
            background: #f0c040;
            width: 30px;
            border-radius: 5px;
        }

        .step-dot.completed {
            background: #34d399;
        }

        /* 3D BACKGROUND */
        .shapes {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .sphere {
            position: absolute;
            border-radius: 50%;
            opacity: 0.4;
        }

        .s-blue {
            width: 350px;
            height: 350px;
            top: -100px;
            right: -80px;
            background: radial-gradient(circle at 40% 36%, #5aacff 0%, #1857d4 34%, transparent 100%);
        }

        .s-gold {
            width: 300px;
            height: 300px;
            bottom: -60px;
            left: -40px;
            background: radial-gradient(circle at 40% 38%, #f0b030 0%, #a85c08 35%, transparent 100%);
        }
    </style>
</head>
<body>
    <div class="shapes">
        <div class="sphere s-blue"></div>
        <div class="sphere s-gold"></div>
    </div>

    <div class="app">
        <main class="main">
            <div class="topbar">
                <div class="logo-group">
                    <div class="logo-icon">⚓</div>
                    <span class="logo-text">ADMIRAL</span>
                </div>
                <div class="progress">
                    <span id="progress-text">Steg 1 av 3</span>
                </div>
            </div>

            <div class="content">
                <div class="wizard-card">
                    <!-- Step 1: Business Info -->
                    <div class="wizard-step active" data-step="1">
                        <div class="step-indicator">
                            <div class="step-dot active"></div>
                            <div class="step-dot"></div>
                            <div class="step-dot"></div>
                        </div>
                        <h1 class="step-title">Företagsinformation</h1>
                        <p class="step-desc">Berätta om ditt företag</p>
                        
                        <div class="form-group">
                            <label>Företagsnamn</label>
                            <input type="text" id="company-name" placeholder="ex. Mina Annonser AB">
                        </div>

                        <div class="form-group">
                            <label>Webbplats</label>
                            <input type="url" id="website" placeholder="https://example.com">
                        </div>

                        <div class="form-group">
                            <label>Bransj</label>
                            <select id="industry">
                                <option value="">Välj...</option>
                                <option value="ecommerce">E-handel</option>
                                <option value="saas">SaaS / Software</option>
                                <option value="services">Tjänster</option>
                                <option value="consulting">Konsultning</option>
                                <option value="other">Övrigt</option>
                            </select>
                        </div>

                        <div class="button-group">
                            <button class="btn-primary" onclick="nextStep(2)">Nästa →</button>
                        </div>
                    </div>

                    <!-- Step 2: Meta Ads API -->
                    <div class="wizard-step" data-step="2">
                        <div class="step-indicator">
                            <div class="step-dot completed"></div>
                            <div class="step-dot active"></div>
                            <div class="step-dot"></div>
                        </div>
                        <h1 class="step-title">Meta Ads API</h1>
                        <p class="step-desc">Koppla din Facebook/Instagram-annonskonto</p>
                        
                        <div class="form-group">
                            <label>Access Token</label>
                            <input type="password" id="access-token" placeholder="eJydUsFuwjAM/BXLT6...">
                            <div class="input-hint">
                                Hämta från <a href="https://developers.facebook.com/apps" target="_blank" style="color: #4fc3f7;">Meta Developers</a>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Ad Account ID</label>
                            <input type="text" id="ad-account-id" placeholder="act_123456789">
                            <div class="input-hint">Format: act_XXXXXX</div>
                        </div>

                        <div class="form-group">
                            <label>Business Account ID</label>
                            <input type="text" id="business-id" placeholder="123456789">
                            <div class="input-hint">Valfritt — behövs för avancerade kampanjer</div>
                        </div>

                        <div class="button-group">
                            <button class="btn-secondary" onclick="prevStep(1)">← Tillbaka</button>
                            <button class="btn-primary" onclick="nextStep(3)">Nästa →</button>
                        </div>
                    </div>

                    <!-- Step 3: Campaign Settings -->
                    <div class="wizard-step" data-step="3">
                        <div class="step-indicator">
                            <div class="step-dot completed"></div>
                            <div class="step-dot completed"></div>
                            <div class="step-dot active"></div>
                        </div>
                        <h1 class="step-title">Kampanjinställningar</h1>
                        <p class="step-desc">Ställ in dina första kampanjparametrar</p>
                        
                        <div class="form-group">
                            <label>Månatlig budget (SEK)</label>
                            <input type="number" id="monthly-budget" placeholder="10000" min="1000">
                        </div>

                        <div class="form-group">
                            <label>Målgrupp</label>
                            <select id="target-audience">
                                <option value="">Välj...</option>
                                <option value="broad">Bred målgrupp (alla)</option>
                                <option value="interests">Intressen-baserad</option>
                                <option value="lookalike">Liknande målgrupper</option>
                                <option value="retargeting">Ommarknadsföring</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Kampanjtyp</label>
                            <select id="campaign-type">
                                <option value="">Välj...</option>
                                <option value="awareness">Medvetenhet</option>
                                <option value="traffic">Webbtrafik</option>
                                <option value="leads">Leadgenerering</option>
                                <option value="sales">Försäljning</option>
                            </select>
                        </div>

                        <div class="button-group">
                            <button class="btn-secondary" onclick="prevStep(2)">← Tillbaka</button>
                            <button class="btn-primary" onclick="completeSetup()">✅ Avsluta inställningar</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let currentStep = 1;

        function nextStep(step) {
            const current = document.querySelector(`[data-step="${currentStep}"]`);
            if (!validateStep(currentStep)) {
                alert('Fyll i alla obligatoriska fält');
                return;
            }
            current.classList.remove('active');
            currentStep = step;
            document.querySelector(`[data-step="${step}"]`).classList.add('active');
            updateProgress();
        }

        function prevStep(step) {
            document.querySelector(`[data-step="${currentStep}"]`).classList.remove('active');
            currentStep = step;
            document.querySelector(`[data-step="${step}"]`).classList.add('active');
            updateProgress();
        }

        function validateStep(step) {
            if (step === 1) {
                return document.getElementById('company-name').value.length > 0;
            }
            if (step === 2) {
                return document.getElementById('access-token').value.length > 0 &&
                       document.getElementById('ad-account-id').value.length > 0;
            }
            if (step === 3) {
                return document.getElementById('monthly-budget').value > 0 &&
                       document.getElementById('campaign-type').value.length > 0;
            }
            return true;
        }

        function updateProgress() {
            document.getElementById('progress-text').textContent = `Steg ${currentStep} av 3`;
        }

        async function completeSetup() {
            const data = {
                company_name: document.getElementById('company-name').value,
                website: document.getElementById('website').value,
                industry: document.getElementById('industry').value,
                access_token: document.getElementById('access-token').value,
                ad_account_id: document.getElementById('ad-account-id').value,
                business_id: document.getElementById('business-id').value,
                monthly_budget: parseInt(document.getElementById('monthly-budget').value),
                target_audience: document.getElementById('target-audience').value,
                campaign_type: document.getElementById('campaign-type').value,
            };

            try {
                const response = await fetch('/api/setup', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    alert('✅ Setup slutfört! Dina inställningar är sparade.');
                    window.location.href = '/dashboard.html';
                } else {
                    alert('❌ Något gick fel. Försök igen.');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('❌ Anslutningsfel');
            }
        }

        // Init
        updateProgress();
    </script>
</body>
</html>
